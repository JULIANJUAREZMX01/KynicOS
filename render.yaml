# KynicOS — Render Deploy Config
# Actualizar el servicio existente: srv-d6b9sihr0fns739m646g
# URL: https://nanobot-cloud-zjr0.onrender.com

services:
  - type: web
    name: kynicos-concierge
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PERSONA
        value: leo
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      # Las siguientes se configuran en el dashboard de Render (secretos):
      # TELEGRAM_TOKEN
      # GROQ_API_KEY
      # ANTHROPIC_API_KEY
      # TWILIO_ACCOUNT_SID
      # TWILIO_AUTH_TOKEN
      # TECH_TELEGRAM_CHAT_ID
